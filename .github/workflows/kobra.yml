name: 🐍 Operation Kobra – NBA Predictions

on:
  schedule:
    - cron: '0 14 * * *'  # Jeden Tag um 14:00 UTC (15:00 DE)
  workflow_dispatch:        # Auch manuell ausführbar

jobs:
  predict:
    runs-on: ubuntu-latest
    
    steps:
    - name: Repository klonen
      uses: actions/checkout@v3
    
    - name: Python einrichten
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Bibliotheken installieren
      run: |
        pip install pandas numpy scikit-learn requests openpyxl
    
    - name: 🐍 Kobra ausführen
      env:
        BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
      run: python kobra.py
    
    - name: Ergebnisse speichern
      uses: actions/upload-artifact@v3
      with:
        name: predictions
        path: predictions_*.csv
    
    - name: Predictions committen
      run: |
        git config --local user.email "kobra@action.com"
        git config --local user.name "🐍 Operation Kobra"
        git add predictions_*.csv
        git diff --staged --quiet || git commit -m "🏀 Predictions $(date +%Y-%m-%d)"
        git push
